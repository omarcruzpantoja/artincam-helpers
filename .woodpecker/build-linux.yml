when:
  - event: [push, pull_request, manual]

platform: linux/amd64

steps:
  - name: build-linux
    image: python:3.12-bookworm
    commands:
      - python -m pip install --upgrade pip
      - python -m pip install uv
      - apt-get update
      - apt-get install -y make zip
      - uv sync --dev
      - make package-linux
      - ls -lah packages